<!DOCTYPE html>
<html lang="en">

<head>

  <meta name="viewport" content="width=device-width">
  <title>so empty</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>
  <div class="main-container">
    <!-- Titre -->
    <h2>
      Bandeau de titre
      <button id="toggle-mode">Mode sombre</button>
      <button id="refresh-button">Rafraîchir</button>
    </h2>

    <!-- Messages -->
    <ul id="messages-list">
      <li>
        <div class="message-header">
          <span class="pseudo">Anonymous</span>
          <span class="date">2026-03-06 16:00</span>
        </div>
        <div class="message-content">
          Placeholder message
        </div>
      </li>
    </ul>

    <!-- Formulaire d'envoi -->
    <form id="send-message-form">
      <textarea id="pseudo-input" placeholder="Pseudonyme"></textarea>
      <textarea id="text-message" placeholder="Entrez votre message ici"></textarea>
      <button type="submit">Envoyer</button>
    </form>

  </div>
</body>
<script src="script.js"></script>
